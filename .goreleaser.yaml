version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: lilcaster
    main: ./main.go
    binary: lilcaster
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm
      - arm64
    goarm:
      - "7"
    ignore:
      - goos: darwin
        goarch: arm

archives:
  - id: lilcaster
    formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "arm64" }}arm64
      {{- else if eq .Arch "arm" }}armv7
      {{- else }}{{ .Arch }}{{ end }}

checksum:
  name_template: checksums.txt

brews:
  - name: lilcaster
    repository:
      owner: jbain
      name: homebrew-lilcaster
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://github.com/jbain/lilcaster"
    description: "Thin CLI wrapper around ffmpeg for livestream testing and automation"
    license: "MIT"
    install: |
      bin.install "lilcaster"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch
